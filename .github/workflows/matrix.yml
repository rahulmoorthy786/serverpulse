# Goal TO install multiple version and do linting for multiple versions.

name: Matrix lint

on:
    workflow_dispatch: 

jobs:
    code-format:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          matrix:
            nodejs: ['22','23','24']
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7

            - name: Setup NodeJs
              uses: actions/setup-node@v7
              with: 
                node-version: ${{ matrix.nodejs }}
                cache: npm
                cache-dependency-path:  backend/package-lock.json

            - name: Check backend files
              run: |
                pwd
                ls -la
                ls -la package.json package-lock.json       

            - name: Install npm packages
              run: npm ci

            - name: Install npm packages
              working-directory: backend
              run: npm ci

            - name: Run lint
              working-directory: backend
              run: npm run lint  

