# Goal TO install multiple version and do linting for multiple versions.

name: Matrix lint

on:
    workflow_dispatch: 

jobs:
    code-format:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          matrix:
            nodejs: ['22','23','24']
        steps:
            - name: Setup NodeJs
              uses: actions/setup-node@v7
              with: 
                node-version: ${{ matrix.nodejs }}
                cache: npm
                cache-dependency-path:  backend/package-lock.json

            - name: Install npm packages
              run: npm ci

