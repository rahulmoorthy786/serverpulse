# Goal Ensure the docker files and Docker Images are security tested.

name: Docker Scan

on: 
    workflow_call: 

jobs:
    docker-file-lint:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false  
          matrix:
            folders: ['frontend','backend']
        steps:
            - name: Code CHeckout
              uses: actions/checkout@v7
        
            - name: Docker lint
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: ${{ matrix.folders }}/Dockerfile

            - name: Docker Setup 
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build and ${{ matrix.folders }}
              run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/serverpulse-${{ matrix.folders }}:latest .
              working-directory: ${{ matrix.folders }}

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ vars.DOCKERHUB_USERNAME }}/serverpulse-${{ matrix.folders }}:latest
                format: 'table'
                exit-code: '1'
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'CRITICAL,HIGH'
              

                  
                
              