# Goal: To check whether the application code coverage doesnt have security threats 

name: Sonar Qube Scan

on: 
    workflow_call: 
     
jobs:
    sonarqube:
        runs-on: ubuntu-latest
        steps:
            - name: actions/checkout@v7
              uses: actions/checkout@v6
              with:
                fetch-depth: 0
            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v8 # Ex: v4.1.0 or sha1, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    
                SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}    
