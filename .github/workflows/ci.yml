# Goal: Build the Image for ServerPulse Frontend and Push to Docker Hub.

name: CI

on: 
    push:
        branches: [feat/workflow]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              
              
            - name: Docker Setup 
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                  push: true
                  tags: ${{ vars.DOCKERHUB_USERNAME }}/serverpulse-frontend:latest


