# Goal: Build the Image for ServerPulse Frontend and Push to Docker Hub.

name: CI

on: 
    push:
        branches: [feat/workflow]

jobs:
    frontend:
        runs-on: ubuntu-latest

        defaults:
          run:
            working-directory: frontend

        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              
            - name: Setup NodeJs
              uses: actions/setup-node@v7
              with: 
                node-version: '24'
                cache: npm
                cache-dependency-path:  frontend/package-lock.json

            - name: Install npm packages
              run: npm ci

            - name: Run Linter
              run: npm run lint
              
            - name: Run Test
              run: npm run test

            - name: Build frontend
              run: npm run build  
           
            - name: Docker Setup 
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./frontend
                file: ./frontend/Dockerfile
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/serverpulse-frontend:latest        



    backend:
        runs-on: ubuntu-latest

        defaults:
          run:
            working-directory: backend

        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              
            - name: Setup NodeJs
              uses: actions/setup-node@v7
              with: 
                node-version: '24'
                cache: npm
                cache-dependency-path:  backend/package-lock.json

            - name: Install npm packages
              run: npm ci

            - name: Run Linter
              run: npm run lint
              
            - name: Run Test
              run: npm run test
                    
            - name: Docker Setup 
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                file: ./backend/Dockerfile
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/serverpulse-backend:latest


        



