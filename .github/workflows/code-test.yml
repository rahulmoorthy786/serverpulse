name: Code Test

on: 
    workflow_call: 

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4 
              
            - name: Setup NodeJs
              uses: actions/setup-node@v7
              with: 
                node-version: '24'
                cache: npm
                cache-dependency-path:  backend/package-lock.json  
             
            - name: Run Test
              run: npm run test
              working-directory: frontend

            - name: Run Test
              run: npm run test
              working-directory: backend
