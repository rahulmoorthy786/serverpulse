# Goal To ensure the packages and dependencies have been audited for security

name: Dependency Scan

on: 
    workflow_call: 

jobs:
    dependency-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Codew Checkout
              uses: actions/checkout@v7
              
            - name: Setup NodeJs
              uses: actions/setup-node@v7
              with: 
                node-version: '24'

            - name: Install Dependencies
              run: npm ci

            - name: Run NPM Audit
              run: npm audit --audit-level=high  